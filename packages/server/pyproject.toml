# DeerGraph server package (ADR-003 §3).
# Python: graph runtime (models/sanitizer/event_mapper/builder) + FastAPI router.

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "deergraph-server"
version = "0.1.0"
description = "DeerGraph runtime graph builder + FastAPI router for LangGraph agents."
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
  "fastapi>=0.111",
  "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["deergraph*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
